                notes:
                  type: string
                  description: 备注
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: confirmed
                  action_item_id:
                    type: string
                    format: uuid
        '404':
          description: 隐性承诺不存在
        '409':
          description: 已确认或已忽略
  /api/v1/actions/implicit/{id}/dismiss:
    post:
      tags:
      - actions
      summary: 忽略隐性承诺
