                  type: string
                  description: 忽略原因
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: dismissed
        '404':
          description: 隐性承诺不存在
        '409':
          description: 已确认或已忽略
  /api/v1/collaboration/network:
    get:
      tags:
      - collaboration
      summary: 获取协作网络图数据
      description: '返回用户之间的协作关系网络，用于可视化展示。


        **关系类型**：

        - communication: 沟通关系（频繁协作、信息桥梁、领域专家）

        - task_based: 任务关系（任务分配者、执行者、评审者）

        - knowledge_based: 知识关系（知识贡献者、提问者、解答者）

        '
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: room_id
        schema:
          type: string
        description: 限定群组范围
      - in: query
        name: relation_type
        schema:
          type: string
          enum:
          - communication
          - task_based
          - knowledge_based
          - all
        default: all
      - in: query
        name: time_range
        schema:
          type: string
          enum:
          - 7d
          - 30d
          - 90d
          - all
        default: 30d
      - in: query
        name: min_weight
        schema:
          type: number
          default: 1.0
        description: 最小关系权重，过滤弱关系
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    description: 用户节点
                    items:
                      type: object
                      properties:
                        user_id:
                          type: string
                        display_name:
                          type: string
                        total_weight:
                          type: number
                        roles:
                          type: array
                          items:
                            type: string
                  edges:
                    type: array
                    description: 关系边
                    items:
                      type: object
                      properties:
                        source:
                          type: string
                        target:
                          type: string
                        relation_type:
                          type: string
                        weight:
                          type: number
                        interaction_count:
                          type: integer
