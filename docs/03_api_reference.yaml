      description: '获取指定文件的内容。默认优先返回摘要。


        **访问策略**：

        - L1 文件：直接返回完整内容

        - L2 摘要：返回摘要内容

        - L2 原文：需要 `prefer=original`，解压后返回

        '
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: file_path
        required: true
        schema:
          type: string
        description: 文件路径
      - in: query
        name: prefer
        schema:
          type: string
          enum:
          - summary
          - original
        default: summary
        description: 优先返回摘要还是原文
      responses:
        '200':
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: 文件不存在
