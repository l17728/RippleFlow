  /api/v1/subscriptions/followable-targets:
    get:
      tags:
      - subscriptions
      summary: 搜索可关注对象
      description: |
        根据实体类型和关键词搜索可关注的对象，供前端订阅选择器使用。
        对于 keyword 类型，返回系统内已有的热门关键词；
        对于 user/thread/document/todo 类型，按名称模糊搜索。
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: entity_type
        required: true
        schema:
          type: string
          enum:
          - user
          - thread
          - category
          - todo
          - document
          - shared_link
          - workflow
          - keyword
        description: 要搜索的实体类型
      - in: query
        name: q
        required: true
        schema:
          type: string
          minLength: 1
        description: 搜索关键词
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
          maximum: 50
      responses:
        '200':
          description: 可关注对象列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: 对象 ID（keyword 类型时即为关键词文本）
                        name:
                          type: string
                          description: 显示名称
                        type:
                          type: string
                          description: 实体类型
                        description:
                          type: string
                          nullable: true
                          description: 补充说明（如话题摘要、用户职位）
                        subscriber_count:
                          type: integer
                          description: 当前订阅人数（帮助判断热门程度）

  /api/v1/subscriptions:
    get:
      tags:
      - subscriptions
      summary: 获取当前用户的订阅列表
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: subscription_type
        schema:
          type: string
          enum:
          - user
          - thread
          - category
          - keyword
          - todo
          - resource
          - event
          - document
          - shared_link
          - workflow
      - in: query
        name: is_active
        schema:
          type: boolean
          default: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
    post:
      tags:
      - subscriptions
      summary: 创建订阅
      description: 用户订阅某人、话题、类别或关键词
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - subscription_type
              - target_id
              properties:
                subscription_type:
                  type: string
                  enum:
                  - user
                  - thread
                  - category
                  - keyword
                  - todo
                  - resource
                  - event
                  - document
                  - shared_link
                  - workflow
                  description: 订阅类型
                target_id:
                  type: string
                  description: |
                    被订阅对象 ID：
                    - user: ldap_user_id
                    - thread/todo/document/shared_link/workflow: UUID
                    - category: category code（如 tech_decision）
                    - keyword: 关键词文本（如 Redis）
                    - resource/event: 对应实体 UUID
                filter_criteria:
                  type: object
                  description: |
                    可选过滤条件，让订阅更精细：
                    {"author": "zhangsan"} 仅收到某人的内容
                    {"tags": ["redis"]} 仅收到含特定标签的内容
                    {"category": "tech_decision"} 仅收到特定类别
                  example: {}
                notification_types:
                  type: array
                  items:
                    type: string
                    enum:
                    - in_app
                    - email
                    - push
                  default:
                  - in_app
                  description: 通知方式
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: 无效的订阅类型或目标
        '404':
          description: 目标不存在
        '409':
          description: 已存在相同订阅
