openapi: 3.0.3
info:
  title: RippleFlow API
  description: '组织群聊信息智能加工系统 REST API。


    **认证**：所有 `/api/v1/*` 和 `/admin/*` 接口需携带 JWT（HttpOnly Cookie `rf_token`）。

    Webhook 接口使用 `X-Webhook-Secret` 请求头鉴权。


    **错误码约定**：

    - `400` 参数校验失败

    - `401` 未登录/Token 过期

    - `403` 无权限（非白名单 / 非当事人）

    - `404` 资源不存在

    - `409` 状态冲突（如已授权的内容重复授权）

    - `422` 业务规则校验失败

    - `500` 服务内部错误

    '
  version: 0.1.0
servers:
- url: http://rippleflow.internal
  description: 内网部署地址
tags:
- name: auth
  description: 认证与会话
- name: webhook
  description: 聊天工具消息接收
- name: threads
  description: 话题线索（知识库核心）
- name: search
  description: 搜索与问答
- name: reference
  description: 参考信息手册
- name: action-items
  description: 任务待办
- name: sensitive
  description: 敏感内容授权
- name: summarize
  description: 讨论纪要生成
- name: notifications
  description: App 内通知
- name: admin
  description: 管理后台（需 admin 角色）
- name: bot
  description: 机器人查询入口
- name: feedback
  description: 问答反馈收集
- name: contribution
  description: 用户贡献统计
- name: butler
  description: AI 管家服务
- name: internal
  description: 内部服务接口（不对外暴露）
- name: logs
  description: 日志上报与查询（客户端上报、异常监控、统计分析）
- name: faq
  description: FAQ 知识库（群聊知识沉淀，由 nullclaw 自动生成与演进）
- name: presence
  description: 用户在线状态与离线消息推送
- name: extensions
  description: 平台扩展机制（软能力/硬能力）
- name: workflows
  description: AI管家工作流托管与跨群任务分发
- name: custom-fields
  description: 跟踪项自定义属性
- name: documents
  description: 用户富文本文档发布（系统内 Markdown 编辑，团队内共享）
- name: shared-links
  description: 外部链接分享卡片（URL + OG元数据，点击跳转）
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rf_token
    webhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
    botAuth:
      type: apiKey
      in: header
      name: X-Bot-Token
      description: 聊天机器人专用认证 Token
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: Token 已过期，请重新登录
        detail:
          type: object
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        pages:
          type: integer
    CurrentUser:
      type: object
      properties:
        ldap_user_id:
          type: string
          example: zhangsan
        display_name:
          type: string
          example: 张三
        email:
          type: string
          example: zhangsan@company.com
        role:
          type: string
          enum:
          - member
          - admin
    InboundMessage:
      type: object
      required:
      - message_id
      - room_id
      - sender
      - content
      - content_type
      - sent_at
      properties:
        message_id:
          type: string
          description: 聊天工具内的唯一消息 ID
          example: msg_abc123
        room_id:
          type: string
          example: room_dev_backend
        sender:
          type: object
          required:
          - user_id
          - display_name
          properties:
            user_id:
              type: string
            display_name:
              type: string
        content:
          type: string
          example: Redis 连接超时怎么处理？
        content_type:
          type: string
          enum:
          - text
          - image
          - file
          - audio
          - video
          - code
          default: text
        attachments:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              url:
                type: string
              name:
                type: string
        reply_to:
          type: string
          nullable: true
          description: 被回复消息的 external_msg_id
        thread_root:
          type: string
          nullable: true
          description: 会话线索根消息的 external_msg_id
        mentions:
          type: array
          items:
            type: string
          description: 被@的用户 external_id 列表
        sent_at:
          type: string
          format: date-time
    ThreadSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        category:
          type: string
        status:
          type: string
          enum:
          - active
          - resolved
          - archived
          - merged
        summary_preview:
          type: string
          description: 摘要前 200 字
        tags:
          type: array
          items:
            type: string
        message_count:
          type: integer
        last_message_at:
          type: string
          format: date-time
        primary_room_id:
          type: string
          format: uuid
          nullable: true
        is_stakeholder:
          type: boolean
          description: 当前用户是否为当事人
    ThreadDetail:
      allOf:
      - $ref: '#/components/schemas/ThreadSummary'
      - type: object
        properties:
          summary:
            type: string
          summary_version:
            type: integer
          summary_updated_at:
            type: string
            format: date-time
          structured_data:
            type: object
          stakeholder_ids:
            type: array
            items:
              type: string
          mentioned_services:
            type: array
            items:
              type: string
          mentioned_techs:
            type: array
            items:
              type: string
          related_threads:
            type: array
            items:
              $ref: '#/components/schemas/ThreadSummary'
          source_rooms:
            type: array
            items:
              type: object
              properties:
                room_id:
                  type: string
                  format: uuid
                room_name:
                  type: string
    SummaryHistoryEntry:
      type: object
      properties:
        version:
          type: integer
        summary:
          type: string
        change_reason:
          type: string
        changed_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    ModificationRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        modified_by:
          type: string
        modified_by_name:
          type: string
        field_modified:
          type: string
        value_before:
          type: string
          nullable: true
        value_after:
          type: string
          nullable: true
        modification_reason:
          type: string
        synced_to_chat:
          type: boolean
        synced_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    UpdateSummaryRequest:
      type: object
      required:
      - field
      - new_value
      - reason
      properties:
        field:
          type: string
          enum:
          - summary
          - structured_data
          - tags
          - status
        new_value:
          type: string
          description: 新内容（summary 为文本；structured_data 为 JSON 字符串；tags 为逗号分隔；status
            为枚举值）
        reason:
          type: string
          minLength: 5
          description: 修正原因（必填）
    SearchRequest:
      type: object
      required:
      - query
      properties:
        query:
          type: string
          minLength: 1
          example: Redis 连接超时
        entity_types:
          type: array
          items:
            type: string
            enum:
            - threads
            - documents
            - shared_links
          description: |
            限定搜索范围，默认搜索所有类型。
            threads=话题线索, documents=富文本文档, shared_links=外部链接分享
          default: [threads, documents, shared_links]
        categories:
          type: array
          items:
            type: string
          description: 限定类别，默认全部（仅对 threads 和 documents 有效）
        date_from:
          type: string
          format: date
          nullable: true
        date_to:
          type: string
          format: date
          nullable: true
        ignore_window:
          type: boolean
          default: false
          description: 是否忽略时间窗口限制
        page:
          type: integer
          default: 1
          minimum: 1
        size:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
    SearchResult:
      type: object
      properties:
        total:
          type: integer
          description: 各类型结果总数之和
        threads:
          type: object
          properties:
            total:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/TopicThread'
          description: 话题线索匹配结果
        documents:
          type: object
          properties:
            total:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/UserDocument'
          description: 用户文档匹配结果
        shared_links:
          type: object
          properties:
            total:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/SharedLink'
          description: 外部链接分享匹配结果
        page:
          type: integer
        size:
          type: integer

    QARequest:
      type: object
      required:
      - question
      properties:
        question:
          type: string
          minLength: 2
          example: Redis 连接超时怎么处理？
        categories:
          type: array
          items:
            type: string
        ignore_window:
          type: boolean
          default: false
    QAResponse:
      type: object
      properties:
        answer:
          type: string
          description: LLM 综合答案
        sources:
          type: array
          items:
            type: object
            properties:
              thread_id:
                type: string
                format: uuid
              title:
                type: string
              category:
                type: string
              summary_excerpt:
                type: string
              last_active:
                type: string
                format: date-time
        keywords_used:
          type: array
          items:
            type: string
          description: LLM 提取的检索关键词
        no_result:
          type: boolean
          description: 未找到相关内容时为 true
    ReferenceItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        thread_id:
          type: string
          format: uuid
          nullable: true
        resource_type:
          type: string
          enum:
          - ip
          - url
          - endpoint
          - domain
          - account
          - port
          - other
        label:
          type: string
        value:
          type: string
          nullable: true
        is_sensitive:
          type: boolean
        environment:
          type: string
          nullable: true
        service_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        is_deprecated:
          type: boolean
        shared_by:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    DeprecateReferenceRequest:
      type: object
      required:
      - reason
      properties:
        reason:
          type: string
    ActionItemSummary:
      type: object
      properties:
        thread_id:
          type: string
          format: uuid
        title:
          type: string
        task:
          type: string
        assignee:
          type: string
        due_date:
          type: string
          format: date
          nullable: true
        priority:
          type: string
          enum:
          - high
          - medium
          - low
        status:
          type: string
          enum:
          - open
          - in_progress
          - done
          - cancelled
        last_message_at:
          type: string
          format: date-time
    UpdateActionItemStatusRequest:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - open
          - in_progress
          - done
          - cancelled
    SensitivePendingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        message_preview:
          type: string
        sensitive_types:
          type: array
          items:
            type: string
        sensitive_summary:
          type: string
        sender_name:
          type: string
        sent_at:
          type: string
          format: date-time
        room_name:
          type: string
        decisions:
          type: object
          additionalProperties: true
        days_pending:
          type: number
        my_status:
          type: string
          enum:
          - pending
          - authorize
          - reject
          - desensitize
          description: 当前登录用户的决策状态
    SensitiveDecisionRequest:
      type: object
      required:
      - decision
      properties:
        decision:
          type: string
          enum:
          - authorize
          - reject
          - desensitize
        note:
          type: string
          nullable: true
          description: 脱敏说明（decision=desensitize 时填写）
        desensitized_content:
          type: string
          nullable: true
          description: 脱敏后的内容（decision=desensitize 时提交）
    AdminSensitiveOverrideRequest:
      type: object
      required:
      - action
      - reason
      properties:
        action:
          type: string
          enum:
          - remove_stakeholder
          - force_authorize
          - force_reject
        target_user:
          type: string
          nullable: true
          description: remove_stakeholder 时必填
        reason:
          type: string
          minLength: 5
    SummarizeRequest:
      type: object
      required:
      - room_id
      properties:
        room_id:
          type: string
          description: 聊天工具的群组 ID
        from_time:
          type: string
          format: date-time
          nullable: true
          description: 起始时间，默认过去 4 小时
        to_time:
          type: string
          format: date-time
          nullable: true
          description: 结束时间，默认当前
        title_hint:
          type: string
          nullable: true
          description: 纪要标题提示
    SummarizeResponse:
      type: object
      properties:
        thread_id:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        participants:
          type: array
          items:
            type: string
        decisions:
          type: array
          items:
            type: string
        action_items:
          type: array
          items:
            type: string
        open_questions:
          type: array
          items:
            type: string
        message_count:
          type: integer
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        title:
          type: string
        body:
          type: string
          nullable: true
        action_url:
          type: string
          nullable: true
        related_id:
          type: string
          format: uuid
          nullable: true
        related_type:
          type: string
          nullable: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
    WhitelistEntry:
      type: object
      properties:
        ldap_user_id:
          type: string
        display_name:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum:
          - member
          - admin
        added_by:
          type: string
          nullable: true
        added_at:
          type: string
          format: date-time
        is_active:
          type: boolean
    AddWhitelistRequest:
      type: object
      required:
      - ldap_user_id
      - display_name
      properties:
        ldap_user_id:
          type: string
        display_name:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
          enum:
          - member
          - admin
          default: member
        notes:
          type: string
          nullable: true
    CategoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        display_name:
          type: string
        description:
          type: string
          nullable: true
        trigger_hints:
          type: array
          items:
            type: string
        search_window_days:
          type: integer
          nullable: true
        is_active:
          type: boolean
        is_builtin:
          type: boolean
        sort_order:
          type: integer
    CreateCategoryRequest:
      type: object
      required:
      - code
      - display_name
      - trigger_hints
      properties:
        code:
          type: string
          pattern: ^[a-z_]+$
        display_name:
          type: string
        description:
          type: string
          nullable: true
        trigger_hints:
          type: array
          items:
            type: string
          minItems: 1
        search_window_days:
          type: integer
          nullable: true
    SystemStats:
      type: object
      properties: null
    BotQueryRequest:
      type: object
      required:
      - query
      - user_id
      - room_id
      properties:
        query:
          type: string
          minLength: 1
          description: 用户原始自然语言输入
          example: Redis 连接池怎么配置
        user_id:
          type: string
          description: 发送者的 ldap_user_id
        room_id:
          type: string
          description: 群组 external_id
        reply_to_msg_id:
          type: string
          nullable: true
          description: 如果是回复某条消息，提供该消息 ID
    BotQueryResponse:
      type: object
      properties:
        intent:
          type: string
          enum:
          - search
          - action_items
          - reference
          - summarize
          - unknown
          description: 识别出的意图
        confidence:
          type: number
          format: float
          description: 意图识别置信度
        response_type:
          type: string
          enum:
          - text
          - card
          - list
          - error
          description: 响应类型
        content:
          oneOf:
          - type: string
            description: 文本响应
          - type: object
            description: 卡片响应
            properties:
              title:
                type: string
              body:
                type: string
              footer:
                type: string
                nullable: true
              action_url:
                type: string
                nullable: true
          - type: array
            description: 列表响应
            items:
              type: object
              properties:
                thread_id:
                  type: string
                  format: uuid
                title:
                  type: string
                category:
                  type: string
                excerpt:
                  type: string
                stakeholders:
                  type: array
                  items:
                    type: string
                last_active:
                  type: string
                  format: date-time
        suggestions:
          type: array
          items:
            type: string
          description: 后续建议问题
          example:
          - 详细说说第一条
          - 还有其他相关内容吗？
        entities:
          type: object
          description: 从查询中提取的实体
          properties:
            keywords:
              type: array
              items:
                type: string
            time_range:
              type: object
              nullable: true
              properties:
                from:
                  type: string
                  format: date-time
                to:
                  type: string
                  format: date-time
            environment:
              type: string
              nullable: true
              example: prod
        error_message:
          type: string
          nullable: true
          description: 当 intent=unknown 或出错时的提示信息
    FeedbackRequest:
      type: object
      required:
      - question
      - answer
      - is_helpful
      properties:
        question:
          type: string
          description: 用户原始问题
        answer:
          type: string
          description: 系统返回的答案
        is_helpful:
          type: boolean
          description: 是否有帮助
        rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
          description: 1-5 分评分
        comment:
          type: string
          nullable: true
          description: 用户备注
        source_thread_ids:
          type: array
          items:
            type: string
            format: uuid
          description: 答案来源线索 ID
    FeedbackStats:
      type: object
      properties:
        total_feedback:
          type: integer
        helpful_count:
          type: integer
        not_helpful_count:
          type: integer
        avg_rating:
          type: number
          nullable: true
        helpful_rate:
          type: number
          description: 有帮助比例 0-1
    UserContribution:
      type: object
      properties:
        user_id:
          type: string
        display_name:
          type: string
        threads_participated:
          type: integer
        messages_count:
          type: integer
        summaries_edited:
          type: integer
        decisions_made:
          type: integer
        questions_asked:
          type: integer
        answers_viewed:
          type: integer
        avg_rating_received:
          type: number
          nullable: true
        weekly_rank:
          type: integer
          nullable: true
        monthly_rank:
          type: integer
          nullable: true
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        user_id:
          type: string
        display_name:
          type: string
        score:
          type: integer
          description: 综合贡献分
        threads_participated:
          type: integer
        summaries_edited:
          type: integer
    WeeklyDigest:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        summary:
          type: object
          properties:
            total_threads:
              type: integer
            threads_by_category:
              type: object
              additionalProperties:
                type: integer
            total_messages:
              type: integer
            active_users:
              type: integer
        hot_discussions:
          type: array
          items:
            type: object
            properties:
              thread_id:
                type: string
                format: uuid
              title:
                type: string
              message_count:
                type: integer
              category:
                type: string
        new_decisions:
          type: array
          items:
            type: object
            properties:
              thread_id:
                type: string
                format: uuid
              title:
                type: string
              category:
                type: string
        due_action_items:
          type: array
          items:
            type: object
            properties:
              thread_id:
                type: string
                format: uuid
              task:
                type: string
              assignee:
                type: string
              due_date:
                type: string
                format: date
        generated_at:
          type: string
          format: date-time
    HealthReport:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        overall_score:
          type: number
          description: 健康度综合评分 0-100
        metrics:
          type: object
          properties:
            knowledge_coverage:
              type: object
              properties:
                score:
                  type: number
                total_threads:
                  type: integer
                orphan_threads:
                  type: integer
                  description: 无关联消息的线索
