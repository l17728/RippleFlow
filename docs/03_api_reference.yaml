  /api/v1/faq/alerts:
    get:
      tags:
      - faq
      summary: 获取 FAQ 质量告警列表（管理员）
      description: '返回当前 open 状态的质量告警，供管理员处理。

        **告警类型**：

        - `unhelpful_threshold`：unhelpful_count ≥ 2，自动触发

        - `zero_helpful_30d`：30天内有浏览但 helpful_count=0

        - `stale_content`：超过 staleness_days 未更新

        - `conflict_detected`：nullclaw 检测到答案与新消息冲突

        - `manual_flag`：管理员/用户手工标记'
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: group_id
        required: true
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - open
          - resolved
          - dismissed
          default: open
      - in: query
        name: alert_type
        schema:
          type: string
          enum:
          - unhelpful_threshold
          - zero_helpful_30d
          - stale_content
          - conflict_detected
          - manual_flag
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      - in: query
        name: size
        schema:
          type: integer
          default: 20
      responses:
        '200':
          description: 告警列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/FaqQualityAlert'
  /api/v1/faq/alerts/{alert_id}/resolve:
    post:
      tags:
      - faq
      summary: 处理 FAQ 质量告警（管理员）
      description: '处理一条质量告警，同时执行对应操作：

        - `resolve_update`：更新 FAQ 答案后关闭告警

        - `resolve_quarantine`：将 FAQ 隔离（普通用户不可见）后关闭告警

        - `resolve_reject`：驳回 FAQ 后关闭告警

        - `dismiss`：忽略本次告警（不修改 FAQ）'
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: alert_id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - action
              properties:
                action:
                  type: string
                  enum:
                  - resolve_update
                  - resolve_quarantine
                  - resolve_reject
                  - dismiss
                note:
                  type: string
                  description: 处理说明
                updated_answer:
                  type: string
                  description: 更新后的答案（action=resolve_update 时必填）
      responses:
        '200':
          description: 告警处理成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqQualityAlert'
  /api/v1/faq/items/{id}/quarantine:
    post:
      tags:
      - faq
      summary: 隔离 / 恢复 FAQ 条目（管理员）
      description: '将 FAQ 质量状态设为 `quarantined`（对普通用户不可见），或从隔离中恢复为 `normal`。

        隔离不等于驳回，隔离中的 FAQ 仍可被管理员查看和编辑。'
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
