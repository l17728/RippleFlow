openapi: 3.0.3
info:
  title: RippleFlow API
  description: |
    组织群聊信息智能加工系统 REST API。

    **认证**：所有 `/api/v1/*` 和 `/admin/*` 接口需携带 JWT（HttpOnly Cookie `rf_token`）。
    Webhook 接口使用 `X-Webhook-Secret` 请求头鉴权。

    **错误码约定**：
    - `400` 参数校验失败
    - `401` 未登录/Token 过期
    - `403` 无权限（非白名单 / 非当事人）
    - `404` 资源不存在
    - `409` 状态冲突（如已授权的内容重复授权）
    - `422` 业务规则校验失败
    - `500` 服务内部错误
  version: "0.1.0"

servers:
  - url: http://rippleflow.internal
    description: 内网部署地址

tags:
  - name: auth
    description: 认证与会话
  - name: webhook
    description: 聊天工具消息接收
  - name: threads
    description: 话题线索（知识库核心）
  - name: search
    description: 搜索与问答
  - name: reference
    description: 参考信息手册
  - name: action-items
    description: 任务待办
  - name: sensitive
    description: 敏感内容授权
  - name: summarize
    description: 讨论纪要生成
  - name: notifications
    description: App 内通知
  - name: admin
    description: 管理后台（需 admin 角色）
  - name: bot
    description: 机器人查询入口
  - name: feedback
    description: 问答反馈收集
  - name: contribution
    description: 用户贡献统计
  - name: butler
    description: AI 管家服务

# ─────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: rf_token
    webhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret
    botAuth:
      type: apiKey
      in: header
      name: X-Bot-Token
      description: 聊天机器人专用认证 Token

  schemas:

    # ── 通用 ──────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:    { type: string, example: "UNAUTHORIZED" }
        message: { type: string, example: "Token 已过期，请重新登录" }
        detail:  { type: object }

    PaginationMeta:
      type: object
      properties:
        total:   { type: integer }
        page:    { type: integer }
        size:    { type: integer }
        pages:   { type: integer }

    # ── 认证 ──────────────────────────────────────────────────────────
    CurrentUser:
      type: object
      properties:
        ldap_user_id: { type: string, example: "zhangsan" }
        display_name: { type: string, example: "张三" }
        email:        { type: string, example: "zhangsan@company.com" }
        role:         { type: string, enum: [member, admin] }

    # ── 消息（Webhook 入参）─────────────────────────────────────────────
    InboundMessage:
      type: object
      required: [message_id, room_id, sender, content, content_type, sent_at]
      properties:
        message_id:
          type: string
          description: 聊天工具内的唯一消息 ID
          example: "msg_abc123"
        room_id:
          type: string
          example: "room_dev_backend"
        sender:
          type: object
          required: [user_id, display_name]
          properties:
            user_id:      { type: string }
            display_name: { type: string }
        content:
          type: string
          example: "Redis 连接超时怎么处理？"
        content_type:
          type: string
          enum: [text, image, file, audio, video, code]
          default: text
        attachments:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              url:  { type: string }
              name: { type: string }
        reply_to:
          type: string
          nullable: true
          description: 被回复消息的 external_msg_id
        thread_root:
          type: string
          nullable: true
          description: 会话线索根消息的 external_msg_id
        mentions:
          type: array
          items: { type: string }
          description: 被@的用户 external_id 列表
        sent_at:
          type: string
          format: date-time

    # ── 话题线索 ──────────────────────────────────────────────────────
    ThreadSummary:
      type: object
      properties:
        id:               { type: string, format: uuid }
        title:            { type: string }
        category:         { type: string }
        status:           { type: string, enum: [active, resolved, archived, merged] }
        summary_preview:  { type: string, description: "摘要前 200 字" }
        tags:             { type: array, items: { type: string } }
        message_count:    { type: integer }
        last_message_at:  { type: string, format: date-time }
        primary_room_id:  { type: string, format: uuid, nullable: true }
        is_stakeholder:   { type: boolean, description: "当前用户是否为当事人" }

    ThreadDetail:
      allOf:
        - $ref: '#/components/schemas/ThreadSummary'
        - type: object
          properties:
            summary:          { type: string }
            summary_version:  { type: integer }
            summary_updated_at: { type: string, format: date-time }
            structured_data:  { type: object }
            stakeholder_ids:  { type: array, items: { type: string } }
            mentioned_services: { type: array, items: { type: string } }
            mentioned_techs:  { type: array, items: { type: string } }
            related_threads:
              type: array
              items: { $ref: '#/components/schemas/ThreadSummary' }
            source_rooms:
              type: array
              items:
                type: object
                properties:
                  room_id:   { type: string, format: uuid }
                  room_name: { type: string }

    SummaryHistoryEntry:
      type: object
      properties:
        version:       { type: integer }
        summary:       { type: string }
        change_reason: { type: string }
        changed_by:    { type: string, nullable: true }
        created_at:    { type: string, format: date-time }

    ModificationRecord:
      type: object
      properties:
        id:                   { type: string, format: uuid }
        modified_by:          { type: string }
        modified_by_name:     { type: string }
        field_modified:       { type: string }
        value_before:         { type: string, nullable: true }
        value_after:          { type: string, nullable: true }
        modification_reason:  { type: string }
        synced_to_chat:       { type: boolean }
        synced_at:            { type: string, format: date-time, nullable: true }
        created_at:           { type: string, format: date-time }

    UpdateSummaryRequest:
      type: object
      required: [field, new_value, reason]
      properties:
        field:
          type: string
          enum: [summary, structured_data, tags, status]
        new_value:
          type: string
          description: "新内容（summary 为文本；structured_data 为 JSON 字符串；tags 为逗号分隔；status 为枚举值）"
        reason:
          type: string
          minLength: 5
          description: "修正原因（必填）"

    # ── 搜索与问答 ────────────────────────────────────────────────────
    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          example: "Redis 连接超时"
        categories:
          type: array
          items: { type: string }
          description: "限定类别，默认全部"
        date_from:
          type: string
          format: date
          nullable: true
        date_to:
          type: string
          format: date
          nullable: true
        ignore_window:
          type: boolean
          default: false
          description: "是否忽略时间窗口限制"
        page:  { type: integer, default: 1, minimum: 1 }
        size:  { type: integer, default: 20, minimum: 1, maximum: 100 }

    SearchResult:
      type: object
      properties:
        threads:
          type: array
          items: { $ref: '#/components/schemas/ThreadSummary' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    QARequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 2
          example: "Redis 连接超时怎么处理？"
        categories:
          type: array
          items: { type: string }
        ignore_window:
          type: boolean
          default: false

    QAResponse:
      type: object
      properties:
        answer:
          type: string
          description: "LLM 综合答案"
        sources:
          type: array
          items:
            type: object
            properties:
              thread_id:    { type: string, format: uuid }
              title:        { type: string }
              category:     { type: string }
              summary_excerpt: { type: string }
              last_active:  { type: string, format: date-time }
        keywords_used:
          type: array
          items: { type: string }
          description: "LLM 提取的检索关键词"
        no_result:
          type: boolean
          description: "未找到相关内容时为 true"

    # ── 参考信息 ──────────────────────────────────────────────────────
    ReferenceItem:
      type: object
      properties:
        id:            { type: string, format: uuid }
        thread_id:     { type: string, format: uuid, nullable: true }
        resource_type: { type: string, enum: [ip, url, endpoint, domain, account, port, other] }
        label:         { type: string }
        value:         { type: string, nullable: true }
        is_sensitive:  { type: boolean }
        environment:   { type: string, nullable: true }
        service_name:  { type: string, nullable: true }
        description:   { type: string, nullable: true }
        is_deprecated: { type: boolean }
        shared_by:     { type: string, nullable: true }
        created_at:    { type: string, format: date-time }

    DeprecateReferenceRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }

    # ── 任务待办 ──────────────────────────────────────────────────────
    ActionItemSummary:
      type: object
      properties:
        thread_id:  { type: string, format: uuid }
        title:      { type: string }
        task:       { type: string }
        assignee:   { type: string }
        due_date:   { type: string, format: date, nullable: true }
        priority:   { type: string, enum: [high, medium, low] }
        status:     { type: string, enum: [open, in_progress, done, cancelled] }
        last_message_at: { type: string, format: date-time }

    UpdateActionItemStatusRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [open, in_progress, done, cancelled] }

    # ── 敏感授权 ──────────────────────────────────────────────────────
    SensitivePendingItem:
      type: object
      properties:
        id:                { type: string, format: uuid }
        message_preview:   { type: string }
        sensitive_types:   { type: array, items: { type: string } }
        sensitive_summary: { type: string }
        sender_name:       { type: string }
        sent_at:           { type: string, format: date-time }
        room_name:         { type: string }
        decisions:         { type: object, additionalProperties: true }
        days_pending:      { type: number }
        my_status:
          type: string
          enum: [pending, authorize, reject, desensitize]
          description: "当前登录用户的决策状态"

    SensitiveDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [authorize, reject, desensitize]
        note:
          type: string
          nullable: true
          description: "脱敏说明（decision=desensitize 时填写）"
        desensitized_content:
          type: string
          nullable: true
          description: "脱敏后的内容（decision=desensitize 时提交）"

    AdminSensitiveOverrideRequest:
      type: object
      required: [action, reason]
      properties:
        action:
          type: string
          enum: [remove_stakeholder, force_authorize, force_reject]
        target_user:
          type: string
          nullable: true
          description: "remove_stakeholder 时必填"
        reason:
          type: string
          minLength: 5

    # ── 纪要生成 ──────────────────────────────────────────────────────
    SummarizeRequest:
      type: object
      required: [room_id]
      properties:
        room_id:
          type: string
          description: "聊天工具的群组 ID"
        from_time:
          type: string
          format: date-time
          nullable: true
          description: "起始时间，默认过去 4 小时"
        to_time:
          type: string
          format: date-time
          nullable: true
          description: "结束时间，默认当前"
        title_hint:
          type: string
          nullable: true
          description: "纪要标题提示"

    SummarizeResponse:
      type: object
      properties:
        thread_id:       { type: string, format: uuid }
        title:           { type: string }
        summary:         { type: string }
        participants:    { type: array, items: { type: string } }
        decisions:       { type: array, items: { type: string } }
        action_items:    { type: array, items: { type: string } }
        open_questions:  { type: array, items: { type: string } }
        message_count:   { type: integer }

    # ── 通知 ──────────────────────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:           { type: string, format: uuid }
        type:         { type: string }
        title:        { type: string }
        body:         { type: string, nullable: true }
        action_url:   { type: string, nullable: true }
        related_id:   { type: string, format: uuid, nullable: true }
        related_type: { type: string, nullable: true }
        is_read:      { type: boolean }
        created_at:   { type: string, format: date-time }

    # ── 管理后台 ──────────────────────────────────────────────────────
    WhitelistEntry:
      type: object
      properties:
        ldap_user_id: { type: string }
        display_name: { type: string }
        email:        { type: string, nullable: true }
        role:         { type: string, enum: [member, admin] }
        added_by:     { type: string, nullable: true }
        added_at:     { type: string, format: date-time }
        is_active:    { type: boolean }

    AddWhitelistRequest:
      type: object
      required: [ldap_user_id, display_name]
      properties:
        ldap_user_id: { type: string }
        display_name: { type: string }
        email:        { type: string, nullable: true }
        role:         { type: string, enum: [member, admin], default: member }
        notes:        { type: string, nullable: true }

    CategoryEntry:
      type: object
      properties:
        id:                  { type: string, format: uuid }
        code:                { type: string }
        display_name:        { type: string }
        description:         { type: string, nullable: true }
        trigger_hints:       { type: array, items: { type: string } }
        search_window_days:  { type: integer, nullable: true }
        is_active:           { type: boolean }
        is_builtin:          { type: boolean }
        sort_order:          { type: integer }

    CreateCategoryRequest:
      type: object
      required: [code, display_name, trigger_hints]
      properties:
        code:               { type: string, pattern: '^[a-z_]+$' }
        display_name:       { type: string }
        description:        { type: string, nullable: true }
        trigger_hints:      { type: array, items: { type: string }, minItems: 1 }
        search_window_days: { type: integer, nullable: true }

    SystemStats:
      type: object
      properties:
        messages_total:         { type: integer }
        messages_processed:     { type: integer }
        messages_skipped_noise: { type: integer }
        messages_sensitive_pending: { type: integer }

    # ── 机器人查询 ──────────────────────────────────────────────────────
    BotQueryRequest:
      type: object
      required: [query, user_id, room_id]
      properties:
        query:
          type: string
          minLength: 1
          description: 用户原始自然语言输入
          example: "Redis 连接池怎么配置"
        user_id:
          type: string
          description: 发送者的 ldap_user_id
        room_id:
          type: string
          description: 群组 external_id
        reply_to_msg_id:
          type: string
          nullable: true
          description: 如果是回复某条消息，提供该消息 ID

    BotQueryResponse:
      type: object
      properties:
        intent:
          type: string
          enum: [search, action_items, reference, summarize, unknown]
          description: 识别出的意图
        confidence:
          type: number
          format: float
          description: 意图识别置信度
        response_type:
          type: string
          enum: [text, card, list, error]
          description: 响应类型
        content:
          oneOf:
            - type: string
              description: 文本响应
            - type: object
              description: 卡片响应
              properties:
                title:    { type: string }
                body:     { type: string }
                footer:   { type: string, nullable: true }
                action_url: { type: string, nullable: true }
            - type: array
              description: 列表响应
              items:
                type: object
                properties:
                  thread_id:  { type: string, format: uuid }
                  title:      { type: string }
                  category:   { type: string }
                  excerpt:    { type: string }
                  stakeholders: { type: array, items: { type: string } }
                  last_active: { type: string, format: date-time }
        suggestions:
          type: array
          items: { type: string }
          description: 后续建议问题
          example: ["详细说说第一条", "还有其他相关内容吗？"]
        entities:
          type: object
          description: 从查询中提取的实体
          properties:
            keywords:
              type: array
              items: { type: string }
            time_range:
              type: object
              nullable: true
              properties:
                from: { type: string, format: date-time }
                to:   { type: string, format: date-time }
            environment:
              type: string
              nullable: true
              example: "prod"
        error_message:
          type: string
          nullable: true
          description: 当 intent=unknown 或出错时的提示信息

    # ── 问答反馈 ──────────────────────────────────────────────────────
    FeedbackRequest:
      type: object
      required: [question, answer, is_helpful]
      properties:
        question:
          type: string
          description: 用户原始问题
        answer:
          type: string
          description: 系统返回的答案
        is_helpful:
          type: boolean
          description: 是否有帮助
        rating:
          type: integer
          minimum: 1
          maximum: 5
          nullable: true
          description: 1-5 分评分
        comment:
          type: string
          nullable: true
          description: 用户备注
        source_thread_ids:
          type: array
          items: { type: string, format: uuid }
          description: 答案来源线索 ID

    FeedbackStats:
      type: object
      properties:
        total_feedback: { type: integer }
        helpful_count: { type: integer }
        not_helpful_count: { type: integer }
        avg_rating: { type: number, nullable: true }
        helpful_rate: { type: number, description: "有帮助比例 0-1" }

    # ── 用户贡献 ──────────────────────────────────────────────────────
    UserContribution:
      type: object
      properties:
        user_id: { type: string }
        display_name: { type: string }
        threads_participated: { type: integer }
        messages_count: { type: integer }
        summaries_edited: { type: integer }
        decisions_made: { type: integer }
        questions_asked: { type: integer }
        answers_viewed: { type: integer }
        avg_rating_received: { type: number, nullable: true }
        weekly_rank: { type: integer, nullable: true }
        monthly_rank: { type: integer, nullable: true }

    LeaderboardEntry:
      type: object
      properties:
        rank: { type: integer }
        user_id: { type: string }
        display_name: { type: string }
        score: { type: integer, description: "综合贡献分" }
        threads_participated: { type: integer }
        summaries_edited: { type: integer }

    # ── AI 管家 ──────────────────────────────────────────────────────
    WeeklyDigest:
      type: object
      properties:
        period:
          type: object
          properties:
            from: { type: string, format: date }
            to: { type: string, format: date }
        summary:
          type: object
          properties:
            total_threads: { type: integer }
            threads_by_category: { type: object, additionalProperties: { type: integer } }
            total_messages: { type: integer }
            active_users: { type: integer }
        hot_discussions:
          type: array
          items:
            type: object
            properties:
              thread_id: { type: string, format: uuid }
              title: { type: string }
              message_count: { type: integer }
              category: { type: string }
        new_decisions:
          type: array
          items:
            type: object
            properties:
              thread_id: { type: string, format: uuid }
              title: { type: string }
              category: { type: string }
        due_action_items:
          type: array
          items:
            type: object
            properties:
              thread_id: { type: string, format: uuid }
              task: { type: string }
              assignee: { type: string }
              due_date: { type: string, format: date }
        generated_at: { type: string, format: date-time }

    HealthReport:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        overall_score: { type: number, description: "健康度综合评分 0-100" }
        metrics:
          type: object
          properties:
            knowledge_coverage:
              type: object
              properties:
                score: { type: number }
                total_threads: { type: integer }
                orphan_threads: { type: integer, description: "无关联消息的线索" }
            qa_quality:
              type: object
              properties:
                score: { type: number }
                avg_rating: { type: number }
                helpful_rate: { type: number }
            user_engagement:
              type: object
              properties:
                score: { type: number }
                active_users_7d: { type: integer }
                avg_daily_queries: { type: number }
            freshness:
              type: object
              properties:
                score: { type: number }
                avg_thread_age_days: { type: number }
                stale_threads_count: { type: integer, description: "超过时间窗口的线索" }
        recommendations:
          type: array
          items: { type: string }
          description: "优化建议"

    ButlerTask:
      type: object
      properties:
        id: { type: string, format: uuid }
        task_type: { type: string }
        status: { type: string }
        permission_level: { type: integer, description: "权限层级 0-3" }
        scheduled_at: { type: string, format: date-time }
        executed_at: { type: string, format: date-time, nullable: true }
        target_room_id: { type: string, format: uuid, nullable: true }
        target_user_ids: { type: array, items: { type: string } }
        payload: { type: object }
        result: { type: object, nullable: true }
        error: { type: string, nullable: true }
        report_reviewed: { type: boolean, description: "汇报是否已审核" }
        created_at: { type: string, format: date-time }

    ButlerExperience:
      type: object
      properties:
        id: { type: string, format: uuid }
        category: { type: string }
        key: { type: string }
        value: { type: object }
        confidence: { type: number }
        sample_count: { type: integer }
        last_updated: { type: string, format: date-time }

    ButlerProposal:
      type: object
      properties:
        id: { type: string, format: uuid }
        task_type: { type: string, description: "任务类型" }
        reasoning: { type: string, description: "发起原因" }
        expected_impact: { type: string, description: "预期影响" }
        risk_assessment: { type: string, nullable: true, description: "风险评估" }
        payload: { type: object, description: "拟执行内容" }
        status: { type: string, enum: [pending, approved, rejected, executed, cancelled] }
        proposed_at: { type: string, format: date-time }
        reviewed_by: { type: string, nullable: true, description: "审核人 ldap_user_id" }
        reviewed_at: { type: string, format: date-time, nullable: true }
        review_comment: { type: string, nullable: true }
        executed_at: { type: string, format: date-time, nullable: true }
        execution_result: { type: object, nullable: true }
        created_at: { type: string, format: date-time }

    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, description: "订阅者 ldap_user_id" }
        subscription_type:
          type: string
          enum: [user, thread, category, keyword]
          description: |
            订阅类型：
            - user: 关注用户
            - thread: 关注话题线索
            - category: 关注类别
            - keyword: 关注关键词
        target_id: { type: string, description: "被订阅对象 ID" }
        target_name: { type: string, nullable: true, description: "被订阅对象名称（用于展示）" }
        notification_types:
          type: array
          items:
            type: string
            enum: [in_app, email, push]
          description: "通知方式"
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SubscriptionStats:
      type: object
      properties:
        subscription_type: { type: string }
        target_id: { type: string }
        target_name: { type: string }
        subscriber_count: { type: integer, description: "订阅者数量" }
        last_activity_at: { type: string, format: date-time, nullable: true }

    PersonalTodo:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, description: "所属用户 ldap_user_id" }
        title: { type: string, description: "待办标题" }
        description: { type: string, nullable: true }
        status:
          type: string
          enum: [pending, in_progress, completed, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        due_date: { type: string, format: date, nullable: true }
        due_time: { type: string, format: time, nullable: true }
        visibility:
          type: string
          enum: [private, followers, team, public]
          description: |
            可见性：
            - private: 仅自己可见
            - followers: 关注我的人可见
            - team: 团队成员可见
            - public: 所有人可见
        published_at: { type: string, format: date-time, nullable: true }
        source_type:
          type: string
          nullable: true
          description: "来源类型：manual | action_item | meeting | import"
        source_id: { type: string, format: uuid, nullable: true }
        tags:
          type: array
          items: { type: string }
        category: { type: string, nullable: true }
        reminder_enabled: { type: boolean }
        reminder_minutes_before: { type: integer, nullable: true }
        reminded_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        completed_by: { type: string, nullable: true }
        collaborators:
          type: array
          items: { $ref: '#/components/schemas/TodoCollaborator' }
        is_overdue: { type: boolean, description: "是否已过期" }
        is_owner: { type: boolean, description: "当前用户是否为所有者" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TodoCollaborator:
      type: object
      properties:
        id: { type: string, format: uuid }
        todo_id: { type: string, format: uuid }
        user_id: { type: string }
        user_name: { type: string, description: "用户显示名称" }
        role:
          type: string
          enum: [owner, editor, viewer]
        can_complete: { type: boolean, description: "是否可标记完成" }
        created_at: { type: string, format: date-time }

    TodoHistory:
      type: object
      properties:
        id: { type: string, format: uuid }
        todo_id: { type: string, format: uuid }
        action:
          type: string
          description: "created | updated | status_changed | completed | commented"
        old_value: { type: object, nullable: true }
        new_value: { type: object, nullable: true }
        changed_by: { type: string }
        changed_by_name: { type: string }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    # ── 微信同步 ─────────────────────────────────────────────────────────
    WechatSyncStatus:
      type: object
      properties:
        room_id: { type: string, format: uuid }
        room_name: { type: string }
        sync_mode:
          type: string
          enum: [realtime, batch, hybrid]
          description: |
            realtime: 仅实时同步
            batch: 仅批量导入
            hybrid: 混合模式（实时优先，批量兜底）
        realtime_status:
          type: string
          enum: [online, offline, error, disabled]
          nullable: true
        realtime_last_heartbeat:
          type: string
          format: date-time
          nullable: true
        last_sync_time:
          type: string
          format: date-time
          nullable: true
        last_message_id: { type: string, nullable: true }
        total_imported: { type: integer, default: 0 }
        total_skipped: { type: integer, default: 0 }
        total_failed: { type: integer, default: 0 }
        updated_at: { type: string, format: date-time }

    ImportJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        platform:
          type: string
          enum: [wechat, feishu, dingtalk, custom]
        room_id: { type: string, format: uuid }
        room_name: { type: string }
        file_name: { type: string }
        file_format: { type: string }
        status:
          type: string
          enum: [pending, parsing, processing, completed, failed, cancelled]
        total_count: { type: integer }
        processed_count: { type: integer }
        new_count: { type: integer, description: 新消息数 }
        skipped_count: { type: integer, description: 跳过数（重复或噪声） }
        failed_count: { type: integer }
        time_range_start:
          type: string
          format: date-time
          nullable: true
        time_range_end:
          type: string
          format: date-time
          nullable: true
        result_summary:
          type: object
          properties:
            threads_created: { type: integer }
            threads_updated: { type: integer }
            action_items_created: { type: integer }
            decisions_created: { type: integer }
            errors:
              type: array
              items: { type: string }
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at: { type: string, format: date-time }
        created_by: { type: string }

    ImportFormat:
      type: object
      properties:
        id: { type: string, example: wechat_txt }
        name: { type: string, example: 微信文本格式 }
        description: { type: string, example: 微信导出的文本格式 }
        example: { type: string }

    # ── 四大类信息域 ─────────────────────────────────────────────────────
    InfoDomain:
      type: object
      properties:
        code:
          type: string
          enum: [knowledge, action, event, collaboration]
        display_name: { type: string, example: 知识库 }
        description: { type: string }
        icon: { type: string, example: book }
        color: { type: string, example: blue }
        categories:
          type: array
          items:
            type: object
            properties:
              code: { type: string }
              display_name: { type: string }
              count: { type: integer }

    # ── 隐性承诺 ─────────────────────────────────────────────────────────
    ImplicitCommitment:
      type: object
      properties:
        id: { type: string, format: uuid }
        message_id: { type: string, format: uuid }
        thread_id: { type: string, format: uuid }
        room_id: { type: string, format: uuid }
        room_name: { type: string }
        content_preview: { type: string }
        pattern_matched: { type: string }
        confidence: { type: number }
        commitment_status:
          type: string
          enum: [identified, confirmed, dismissed]
        identified_at: { type: string, format: date-time }
        confirmed_at:
          type: string
          format: date-time
          nullable: true
        action_item_id:
          type: string
          format: uuid
          nullable: true
        sender_id: { type: string }
        sender_name: { type: string }

    # ── 协作关系统计 ─────────────────────────────────────────────────────
    CollaborationStats:
      type: object
      properties:
        user_id: { type: string }
        display_name: { type: string }
        total_interactions: { type: integer }
        top_collaborators:
          type: array
          items:
            type: object
            properties:
              user_id: { type: string }
              display_name: { type: string }
              interaction_count: { type: integer }
        roles:
          type: array
          items: { type: string }
        knowledge_contributions: { type: integer }
        tasks_completed: { type: integer }

    # ── 文件系统 ─────────────────────────────────────────────────────────
    FileInfo:
      type: object
      properties:
        id: { type: string, format: uuid }
        thread_id: { type: string, format: uuid }
        file_path: { type: string }
        file_name: { type: string }
        layer:
          type: string
          enum: [L1, L2, L3]
        file_type:
          type: string
          enum: [thread, summary, original, graph, index]
        status:
          type: string
          enum: [active, archived, compacted]
        file_size: { type: integer }
        compressed_size: { type: integer }
        created_at: { type: string, format: date-time }
        last_access_at: { type: string, format: date-time }
        compacted_at:
          type: string
          format: date-time
          nullable: true

    CompactJob:
      type: object
      properties:
        id: { type: string, format: uuid }
        compact_type:
          type: string
          enum: [L1_to_L2, L2_to_L3]
        thread_ids:
          type: array
          items: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, processing, completed, failed]
        total_count: { type: integer }
        processed_count: { type: integer }
        failed_count: { type: integer }
        result:
          type: object
          properties:
            summaries_generated: { type: integer }
            files_compressed: { type: integer }
            errors:
              type: array
              items: { type: string }
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at: { type: string, format: date-time }

    FileSystemStats:
      type: object
      properties:
        total_files: { type: integer }
        total_size: { type: integer }
        by_layer:
          type: object
          properties:
            L1:
              type: object
              properties:
                file_count: { type: integer }
                total_size: { type: integer }
            L2:
              type: object
              properties:
                file_count: { type: integer }
                total_size: { type: integer }
                compressed_size: { type: integer }
            L3:
              type: object
              properties:
                file_count: { type: integer }
                total_size: { type: integer }
        pending_compact:
          type: object
          properties:
            L1_candidates: { type: integer }
            L2_candidates: { type: integer }

    # ── 系统统计（已有）──────────────────────────────────────────────
    SystemStats:
      type: object
      properties:
# ─────────────────────────────────────────────────────────────────────
paths:

  # ════════════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════════════

  /auth/sso:
    get:
      tags: [auth]
      summary: 发起 SSO 登录
      description: 重定向至企业 SSO 登录页
      security: []
      parameters:
        - in: query
          name: redirect
          schema: { type: string }
          description: 登录成功后的跳转路径
      responses:
        '302':
          description: 重定向至 SSO

  /auth/callback:
    get:
      tags: [auth]
      summary: SSO 回调处理
      security: []
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
      responses:
        '302':
          description: 登录成功，设置 Cookie，重定向至 dashboard
        '403':
          description: 用户不在白名单
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      tags: [auth]
      summary: 登出，清除 Cookie
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 登出成功

  /auth/me:
    get:
      tags: [auth]
      summary: 获取当前登录用户信息
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        '401':
          description: 未登录

  # ════════════════════════════════════════════════════
  # WEBHOOK
  # ════════════════════════════════════════════════════

  /webhook/message:
    post:
      tags: [webhook]
      summary: 接收聊天工具推送的新消息
      security:
        - webhookSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InboundMessage' }
      responses:
        '200':
          description: 消息已接收入队
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:    { type: boolean }
                  message_id:  { type: string }
        '400':
          description: 请求参数错误
        '401':
          description: Webhook Secret 无效

  # ════════════════════════════════════════════════════
  # THREADS（话题线索）
  # ════════════════════════════════════════════════════

  /api/v1/threads:
    get:
      tags: [threads]
      summary: 获取话题线索列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: category
          schema: { type: string }
          description: 按类别过滤
        - in: query
          name: status
          schema: { type: string, enum: [active, resolved, archived] }
        - in: query
          name: q
          schema: { type: string }
          description: 全文检索关键词
        - in: query
          name: ignore_window
          schema: { type: boolean, default: false }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: size
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 线索列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: '#/components/schemas/ThreadSummary' } }
                  meta:  { $ref: '#/components/schemas/PaginationMeta' }

  /api/v1/threads/{thread_id}:
    get:
      tags: [threads]
      summary: 获取话题线索详情
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 线索详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThreadDetail' }
        '404':
          description: 线索不存在

  /api/v1/threads/{thread_id}/summary:
    put:
      tags: [threads]
      summary: 当事人修改话题线索（摘要/结构化数据/状态）
      description: |
        仅当事人（stakeholder_ids 中）或管理员可调用。
        修改后自动异步同步至原群（冠以用户名）。
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSummaryRequest' }
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThreadDetail' }
        '403':
          description: 非当事人，无修改权限
        '404':
          description: 线索不存在

  /api/v1/threads/{thread_id}/history:
    get:
      tags: [threads]
      summary: 获取话题线索摘要历史版本
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 历史版本列表（降序）
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SummaryHistoryEntry' }

  /api/v1/threads/{thread_id}/modifications:
    get:
      tags: [threads]
      summary: 获取话题线索的当事人修改记录
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 修改记录列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ModificationRecord' }

  # ════════════════════════════════════════════════════
  # SEARCH & Q&A
  # ════════════════════════════════════════════════════

  /api/v1/search:
    post:
      tags: [search]
      summary: 全文检索话题线索
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchRequest' }
      responses:
        '200':
          description: 检索结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResult' }

  /api/v1/qa:
    post:
      tags: [search]
      summary: LLM 智能问答（基于摘要上下文）
      description: |
        1. 提取关键词
        2. 全文检索相关线索
        3. 将 Top-10 摘要传给 GLM-4-Plus 生成答案
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QARequest' }
      responses:
        '200':
          description: 问答结果
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QAResponse' }

  # ════════════════════════════════════════════════════
  # REFERENCE DATA
  # ════════════════════════════════════════════════════

  /api/v1/reference:
    get:
      tags: [reference]
      summary: 获取参考信息列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: 关键词（标签/服务名模糊匹配）
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: environment
          schema: { type: string }
        - in: query
          name: service_name
          schema: { type: string }
        - in: query
          name: include_deprecated
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: 参考信息列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReferenceItem' }

  /api/v1/reference/{item_id}:
    get:
      tags: [reference]
      summary: 获取单条参考信息
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: item_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReferenceItem' }

  /api/v1/reference/{item_id}/deprecate:
    post:
      tags: [reference]
      summary: 标记参考信息为已废弃（当事人或管理员）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: item_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeprecateReferenceRequest' }
      responses:
        '200':
          description: 已标记废弃
        '403':
          description: 无权限

  # ════════════════════════════════════════════════════
  # ACTION ITEMS（任务待办）
  # ════════════════════════════════════════════════════

  /api/v1/action-items:
    get:
      tags: [action-items]
      summary: 获取任务待办列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: assignee
          schema: { type: string }
          description: 按负责人过滤（ldap_user_id）
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: priority
          schema: { type: string, enum: [high, medium, low] }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ActionItemSummary' }

  /api/v1/action-items/{thread_id}/status:
    put:
      tags: [action-items]
      summary: 更新任务状态（当事人）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateActionItemStatusRequest' }
      responses:
        '200':
          description: 状态已更新
        '403':
          description: 非当事人

  # ════════════════════════════════════════════════════
  # SENSITIVE AUTHORIZATIONS（敏感授权）
  # ════════════════════════════════════════════════════

  /api/v1/sensitive/pending:
    get:
      tags: [sensitive]
      summary: 获取当前用户待处理的敏感内容授权列表
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 待授权列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SensitivePendingItem' }

  /api/v1/sensitive/{auth_id}:
    get:
      tags: [sensitive]
      summary: 获取单条敏感授权详情（含完整消息内容）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: auth_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SensitivePendingItem' }
        '403':
          description: 非当事人

  /api/v1/sensitive/{auth_id}/decide:
    post:
      tags: [sensitive]
      summary: 当事人提交授权决策
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: auth_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SensitiveDecisionRequest' }
      responses:
        '200':
          description: 决策已记录
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_status: { type: string }
                  pending_count:  { type: integer }
        '403':
          description: 非当事人
        '409':
          description: 已做过决策（拒绝后不可更改）

  /api/v1/sensitive/{auth_id}/nudge:
    post:
      tags: [sensitive]
      summary: 催促其他当事人尽快决策（发 App 内通知）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: auth_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 通知已发送
        '403':
          description: 非当事人
        '429':
          description: 24 小时内只能催促一次

  /api/v1/sensitive/batch-authorize:
    post:
      tags: [sensitive]
      summary: 批量授权敏感内容
      description: 当事人对多条敏感内容统一处理
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [auth_ids, decision]
              properties:
                auth_ids:
                  type: array
                  items: { type: string, format: uuid }
                  maxItems: 20
                  description: 敏感授权 ID 列表
                decision:
                  type: string
                  enum: [authorize, reject]
                  description: 授权决策
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success_count: { type: integer }
                  failed_items:
                    type: array
                    items:
                      type: object
                      properties:
                        auth_id: { type: string, format: uuid }
                        reason: { type: string }
        '400':
          description: 参数错误
        '403':
          description: 部分内容非当事人

  # ════════════════════════════════════════════════════
  # SUMMARIZE（纪要生成）
  # ════════════════════════════════════════════════════

  /api/v1/summarize:
    post:
      tags: [summarize]
      summary: 触发讨论纪要生成（手动）
      description: |
        对指定群组在指定时间段内的消息生成结构化纪要，
        生成结果作为 discussion_notes 类型的话题线索保存。
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SummarizeRequest' }
      responses:
        '200':
          description: 纪要已生成
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SummarizeResponse' }
        '422':
          description: 指定时间段内消息数量不足（< 3 条）

  # ════════════════════════════════════════════════════
  # NOTIFICATIONS（通知）
  # ════════════════════════════════════════════════════

  /api/v1/notifications:
    get:
      tags: [notifications]
      summary: 获取当前用户的通知列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: unread_only
          schema: { type: boolean, default: false }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: size
          schema: { type: integer, default: 50 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:        { type: array, items: { $ref: '#/components/schemas/Notification' } }
                  unread_count: { type: integer }
                  meta:         { $ref: '#/components/schemas/PaginationMeta' }

  /api/v1/notifications/{notification_id}/read:
    put:
      tags: [notifications]
      summary: 标记单条通知为已读
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: notification_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: 已标记

  /api/v1/notifications/read-all:
    put:
      tags: [notifications]
      summary: 全部标记为已读
      security:
        - cookieAuth: []
      responses:
        '200':
          description: 已全部标记

  /api/v1/notifications/mark-read:
    post:
      tags: [notifications]
      summary: 批量标记已读
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notification_ids]
              properties:
                notification_ids:
                  type: array
                  items: { type: string, format: uuid }
                  maxItems: 100
                  description: 通知 ID 列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_count: { type: integer }

  # ════════════════════════════════════════════════════
  # ADMIN
  # ════════════════════════════════════════════════════

  /admin/whitelist:
    get:
      tags: [admin]
      summary: 获取白名单列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: role
          schema: { type: string }
        - in: query
          name: include_inactive
          schema: { type: boolean, default: false }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WhitelistEntry' }
    post:
      tags: [admin]
      summary: 添加用户到白名单
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddWhitelistRequest' }
      responses:
        '201':
          description: 用户已添加
        '409':
          description: 用户已在白名单中

  /admin/whitelist/{ldap_user_id}:
    put:
      tags: [admin]
      summary: 更新白名单用户（角色/激活状态）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ldap_user_id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:      { type: string, enum: [member, admin] }
                is_active: { type: boolean }
                notes:     { type: string }
      responses:
        '200':
          description: 已更新
    delete:
      tags: [admin]
      summary: 从白名单移除用户（软删除，is_active=false）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: ldap_user_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 已移除
        '400':
          description: 不能移除自己

  /admin/categories:
    get:
      tags: [admin]
      summary: 获取信息类别列表
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CategoryEntry' }
    post:
      tags: [admin]
      summary: 新增自定义信息类别
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201':
          description: 类别已创建
        '409':
          description: code 已存在

  /admin/categories/{category_id}:
    put:
      tags: [admin]
      summary: 更新类别定义（内置类别不可修改 code）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: category_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:       { type: string }
                description:        { type: string }
                trigger_hints:      { type: array, items: { type: string } }
                search_window_days: { type: integer, nullable: true }
                is_active:          { type: boolean }
      responses:
        '200':
          description: 已更新

  /admin/sensitive:
    get:
      tags: [admin]
      summary: 获取所有待处理敏感授权（管理员视图）
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: min_days_pending
          schema: { type: integer }
          description: 过滤超过 N 天未处理的
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SensitivePendingItem' }

  /admin/sensitive/{auth_id}/override:
    post:
      tags: [admin]
      summary: 管理员强制介入敏感授权（处理离职员工等情况）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: auth_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminSensitiveOverrideRequest' }
      responses:
        '200':
          description: 操作已执行，全程留有审计日志

  /admin/stats:
    get:
      tags: [admin]
      summary: 系统统计数据
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SystemStats' }

  # ════════════════════════════════════════════════════
  # BOT（机器人查询入口）
  # ════════════════════════════════════════════════════

  /api/v1/bot/query:
    post:
      tags: [bot]
      summary: 机器人自然语言查询入口
      description: |
        供聊天机器人调用的统一查询入口。
        系统会自动识别用户意图并路由到对应服务。
        查询结果按提问者权限过滤。
      security:
        - botAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BotQueryRequest' }
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BotQueryResponse' }
        '401':
          description: 机器人认证失败
        '403':
          description: 用户不在白名单

  /api/v1/notifications/poll:
    get:
      tags: [notifications]
      summary: 通知长轮询（实时更新）
      description: |
        用于前端实时获取通知更新。
        如果 last_check 之后有新通知，立即返回。
        否则等待最多 30 秒后返回空结果。
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: last_check
          required: true
          schema:
            type: string
            format: date-time
          description: 上次检查时间
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  new_count:
                    type: integer
                    description: 新通知数量
                  has_updates:
                    type: boolean

  /api/v1/action-items/{thread_id}/status:
    put:
      tags: [action_items]
      summary: 更新任务状态
      description: |
        更新 action_item 类型线索的任务状态。
        分配者、被分配者、管理员均可调用。
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, done, cancelled]
                note:
                  type: string
                  description: 状态变更说明
      responses:
        '200':
          description: 状态已更新
        '403':
          description: 无权限（非分配者/被分配者/管理员）
        '404':
          description: 线索不存在或非 action_item 类型

  # ════════════════════════════════════════════════════
  # FEEDBACK（问答反馈）
  # ════════════════════════════════════════════════════

  /api/v1/feedback:
    post:
      tags: [feedback]
      summary: 提交问答反馈
      description: 用户对问答结果进行评价，帮助系统优化
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeedbackRequest' }
      responses:
        '200':
          description: 反馈已提交
        '400':
          description: 参数错误

  /api/v1/feedback/stats:
    get:
      tags: [feedback]
      summary: 获取反馈统计
      description: 管理员查看反馈统计数据
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: from_date
          schema: { type: string, format: date }
        - in: query
          name: to_date
          schema: { type: string, format: date }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedbackStats' }
        '403':
          description: 非管理员

  # ════════════════════════════════════════════════════
  # CONTRIBUTION（用户贡献）
  # ════════════════════════════════════════════════════

  /api/v1/contribution/me:
    get:
      tags: [contribution]
      summary: 获取当前用户贡献统计
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserContribution' }

  /api/v1/contribution/leaderboard:
    get:
      tags: [contribution]
      summary: 获取贡献排行榜
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [weekly, monthly, all_time]
            default: weekly
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  period: { type: string }
                  leaderboard:
                    type: array
                    items: { $ref: '#/components/schemas/LeaderboardEntry' }

  # ════════════════════════════════════════════════════
  # BUTLER（AI 管家）
  # ════════════════════════════════════════════════════

  /api/v1/butler/digest:
    post:
      tags: [butler]
      summary: 手动触发每周快报生成
      description: 管理员可手动触发快报生成并推送到指定群
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_id]
              properties:
                room_id: { type: string, description: 目标群组 ID }
                from_date: { type: string, format: date }
                to_date: { type: string, format: date }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WeeklyDigest' }
        '403':
          description: 非管理员

  /api/v1/butler/health:
    get:
      tags: [butler]
      summary: 获取知识库健康报告
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthReport' }

  /api/v1/butler/tasks:
    get:
      tags: [butler]
      summary: 获取管家任务列表
      description: 管理员查看管家任务执行历史
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: task_type
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ButlerTask' }
        '403':
          description: 非管理员

  /api/v1/butler/experience:
    get:
      tags: [butler]
      summary: 获取管家经验知识库
      description: 管理员查看管家学习到的经验
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: category
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ButlerExperience' }
        '403':
          description: 非管理员

  /api/v1/butler/proposals:
    get:
      tags: [butler]
      summary: 获取管家提案列表
      description: 管理员查看 L3 权限提案
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, executed, cancelled]
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ButlerProposal' }
        '403':
          description: 非管理员

    post:
      tags: [butler]
      summary: 创建管家提案
      description: 管家发起 L3 权限操作提案（系统内部调用）
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_type, reasoning, expected_impact, payload]
              properties:
                task_type:
                  type: string
                  description: 任务类型
                reasoning:
                  type: string
                  description: 发起原因
                expected_impact:
                  type: string
                  description: 预期影响
                risk_assessment:
                  type: string
                  description: 风险评估
                payload:
                  type: object
                  description: 拟执行内容
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ButlerProposal' }
        '403':
          description: 非管理员

  /api/v1/butler/proposals/{proposal_id}/approve:
    post:
      tags: [butler]
      summary: 批准管家提案
      description: 管理员批准 L3 权限提案
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 审批备注
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ButlerProposal' }
        '403':
          description: 非管理员
        '404':
          description: 提案不存在
        '409':
          description: 提案状态不允许审批

  /api/v1/butler/proposals/{proposal_id}/reject:
    post:
      tags: [butler]
      summary: 拒绝管家提案
      description: 管理员拒绝 L3 权限提案
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: proposal_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: 拒绝原因
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ButlerProposal' }
        '403':
          description: 非管理员
        '404':
          description: 提案不存在
        '409':
          description: 提案状态不允许审批

  /api/v1/butler/reports/{task_id}/review:
    post:
      tags: [butler]
      summary: 审核管家汇报
      description: 管理员审核 L2 权限操作的事后汇报
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [normal, needs_adjustment, banned]
                  description: 审核结果
                comment:
                  type: string
                  description: 审核备注
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ButlerTask' }
        '403':
          description: 非管理员
        '404':
          description: 任务不存在

  # ════════════════════════════════════════════════════
  # SUBSCRIPTIONS（订阅/关注）
  # ════════════════════════════════════════════════════

  /api/v1/subscriptions:
    get:
      tags: [subscriptions]
      summary: 获取当前用户的订阅列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: subscription_type
          schema:
            type: string
            enum: [user, thread, category, keyword]
        - in: query
          name: is_active
          schema: { type: boolean, default: true }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Subscription' }

    post:
      tags: [subscriptions]
      summary: 创建订阅
      description: 用户订阅某人、话题、类别或关键词
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscription_type, target_id]
              properties:
                subscription_type:
                  type: string
                  enum: [user, thread, category, keyword]
                  description: 订阅类型
                target_id:
                  type: string
                  description: |
                    被订阅对象 ID：
                    - user: ldap_user_id
                    - thread: thread UUID
                    - category: category code
                    - keyword: 关键词文本
                notification_types:
                  type: array
                  items:
                    type: string
                    enum: [in_app, email, push]
                  default: ["in_app"]
                  description: 通知方式
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
        '400':
          description: 无效的订阅类型或目标
        '404':
          description: 目标不存在
        '409':
          description: 已存在相同订阅

  /api/v1/subscriptions/{subscription_id}:
    delete:
      tags: [subscriptions]
      summary: 取消订阅
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: subscription_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: 取消成功
        '403':
          description: 非本人订阅
        '404':
          description: 订阅不存在

    patch:
      tags: [subscriptions]
      summary: 更新订阅设置
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: subscription_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notification_types:
                  type: array
                  items:
                    type: string
                    enum: [in_app, email, push]
                is_active:
                  type: boolean
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }
        '403':
          description: 非本人订阅
        '404':
          description: 订阅不存在

  /api/v1/subscriptions/check:
    get:
      tags: [subscriptions]
      summary: 检查是否已订阅某对象
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: subscription_type
          required: true
          schema:
            type: string
            enum: [user, thread, category, keyword]
        - in: query
          name: target_id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_subscribed: { type: boolean }
                  subscription: { $ref: '#/components/schemas/Subscription', nullable: true }

  /api/v1/subscriptions/trending:
    get:
      tags: [subscriptions]
      summary: 获取热门订阅对象
      description: 查看当前最受欢迎的订阅目标
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: subscription_type
          schema:
            type: string
            enum: [user, thread, category, keyword]
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    target_id: { type: string }
                    target_name: { type: string }
                    subscription_count: { type: integer }
                    subscription_type: { type: string }

  # ════════════════════════════════════════════════════
  # PERSONAL TODOS（个人待办）
  # ════════════════════════════════════════════════════

  /api/v1/todos:
    get:
      tags: [todos]
      summary: 获取当前用户的待办列表
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - in: query
          name: due_before
          schema: { type: string, format: date }
          description: 截止日期在此之前的待办
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: include_collaborated
          schema: { type: boolean, default: false }
          description: 是否包含作为协作者的待办
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PersonalTodo' }
                  total: { type: integer }
                  overdue_count: { type: integer }

    post:
      tags: [todos]
      summary: 创建待办事项
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, maxLength: 500 }
                description: { type: string }
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
                  default: medium
                due_date: { type: string, format: date }
                due_time: { type: string, format: time }
                visibility:
                  type: string
                  enum: [private, followers, team, public]
                  default: private
                tags:
                  type: array
                  items: { type: string }
                category: { type: string }
                reminder_enabled: { type: boolean, default: true }
                reminder_minutes_before: { type: integer, default: 30 }
                collaborator_ids:
                  type: array
                  items: { type: string }
                  description: 协作者 ldap_user_id 列表
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonalTodo' }
        '400':
          description: 参数错误

  /api/v1/todos/{todo_id}:
    get:
      tags: [todos]
      summary: 获取待办详情
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonalTodo' }
        '403':
          description: 无权访问
        '404':
          description: 待办不存在

    patch:
      tags: [todos]
      summary: 更新待办事项
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status:
                  type: string
                  enum: [pending, in_progress, completed, cancelled]
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
                due_date: { type: string, format: date, nullable: true }
                due_time: { type: string, format: time, nullable: true }
                visibility:
                  type: string
                  enum: [private, followers, team, public]
                tags:
                  type: array
                  items: { type: string }
                category: { type: string }
                reminder_enabled: { type: boolean }
                reminder_minutes_before: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonalTodo' }
        '403':
          description: 无权修改
        '404':
          description: 待办不存在

    delete:
      tags: [todos]
      summary: 删除待办事项
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: 删除成功
        '403':
          description: 无权删除
        '404':
          description: 待办不存在

  /api/v1/todos/{todo_id}/complete:
    post:
      tags: [todos]
      summary: 标记待办完成
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                  description: 完成备注
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonalTodo' }
        '403':
          description: 无权操作
        '404':
          description: 待办不存在

  /api/v1/todos/{todo_id}/reopen:
    post:
      tags: [todos]
      summary: 重新打开待办
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonalTodo' }
        '403':
          description: 无权操作
        '404':
          description: 待办不存在

  /api/v1/todos/{todo_id}/collaborators:
    get:
      tags: [todos]
      summary: 获取待办协作者列表
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TodoCollaborator' }

    post:
      tags: [todos]
      summary: 添加协作者
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: string, description: 协作者 ldap_user_id }
                role:
                  type: string
                  enum: [editor, viewer]
                  default: viewer
                can_complete: { type: boolean, default: false }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TodoCollaborator' }
        '403':
          description: 无权添加
        '404':
          description: 待办不存在
        '409':
          description: 已是协作者

  /api/v1/todos/{todo_id}/collaborators/{user_id}:
    delete:
      tags: [todos]
      summary: 移除协作者
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: user_id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: 移除成功
        '403':
          description: 无权操作
        '404':
          description: 协作者不存在

  /api/v1/todos/{todo_id}/history:
    get:
      tags: [todos]
      summary: 获取待办历史记录
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: todo_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TodoHistory' }

  /api/v1/todos/user/{user_id}:
    get:
      tags: [todos]
      summary: 获取某用户的公开待办
      description: 查看其他用户发布的待办（visibility != private）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: string }
          description: 用户 ldap_user_id
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, in_progress, completed, cancelled]
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PersonalTodo' }
                  total: { type: integer }
                  user_info:
                    type: object
                    properties:
                      user_id: { type: string }
                      display_name: { type: string }
                      is_followed: { type: boolean }

  /api/v1/todos/stats:
    get:
      tags: [todos]
      summary: 获取待办统计
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  pending: { type: integer }
                  in_progress: { type: integer }
                  completed: { type: integer }
                  overdue: { type: integer }
                  due_today: { type: integer }
                  due_this_week: { type: integer }
                  by_priority:
                    type: object
                    properties:
                      urgent: { type: integer }
                      high: { type: integer }
                      medium: { type: integer }
                      low: { type: integer }

  /api/v1/todos/categories:
    get:
      tags: [todos]
      summary: 获取用户的待办分类列表
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    count: { type: integer }

  # ════════════════════════════════════════════════════
  # WECHAT SYNC
  # ════════════════════════════════════════════════════

  /api/v1/wechat/sync/start:
    post:
      tags: [wechat]
      summary: 启动 Wechaty 实时同步
      description: |
        使用小号启动微信群消息实时同步。

        **风险提示**：
        - 微信个人号无官方API，使用第三方协议存在封号风险
        - 建议使用只读模式（mode=readonly）降低风险
        - 建议使用专门的同步小号，避免主号风险
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [room_ids]
              properties:
                room_ids:
                  type: array
                  items: { type: string }
                  description: 要监控的群组ID列表
                mode:
                  type: string
                  enum: [readonly, full]
                  default: readonly
                  description: |
                    readonly: 只接收消息，不主动发送（推荐，风险更低）
                    full: 可接收可发送（风险较高）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: started }
                  monitored_rooms: { type: integer }
                  mode: { type: string }
        '403':
          description: 非管理员
        '409':
          description: 同步服务已运行

  /api/v1/wechat/sync/stop:
    post:
      tags: [wechat]
      summary: 停止实时同步
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: stopped }
        '403':
          description: 非管理员

  /api/v1/wechat/sync/status:
    get:
      tags: [wechat]
      summary: 获取同步状态
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: room_id
          schema: { type: string }
          description: 指定群组ID，不传则返回全部
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  realtime_status:
                    type: string
                    enum: [online, offline, error, disabled]
                    description: 实时通道状态
                  realtime_last_heartbeat:
                    type: string
                    format: date-time
                    nullable: true
                  rooms:
                    type: array
                    items:
                      type: object
                      properties:
                        room_id: { type: string }
                        room_name: { type: string }
                        sync_mode:
                          type: string
                          enum: [realtime, batch, hybrid]
                        realtime_status: { type: string }
                        last_sync_time:
                          type: string
                          format: date-time
                          nullable: true
                        total_imported: { type: integer }
                        total_skipped: { type: integer }

  /api/v1/wechat/import/incremental:
    post:
      tags: [wechat]
      summary: 增量导入微信消息
      description: |
        上传微信消息文件进行增量导入。

        **支持的格式**：
        - `wechat_txt`: 微信导出的文本格式
        - `wechat_db`: PC微信本地数据库
        - `json`: 通用JSON格式
        - `csv`: 通用CSV格式

        **增量机制**：
        - 根据最后同步时间过滤，只导入新消息
        - 通过发送者+时间+内容哈希去重
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, room_id, format]
              properties:
                file:
                  type: string
                  format: binary
                  description: 导入文件
                room_id:
                  type: string
                  description: 目标群组ID
                format:
                  type: string
                  enum: [wechat_txt, wechat_db, json, csv]
                  description: 文件格式
                options:
                  type: object
                  properties:
                    skip_noise:
                      type: boolean
                      default: true
                    reprocess:
                      type: boolean
                      default: false
                      description: 是否重新处理已存在的消息
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string }
                  total_count: { type: integer }
                  new_count: { type: integer, description: 新消息数 }
                  skipped_count: { type: integer, description: 跳过数（重复或噪声） }
                  failed_count: { type: integer }
        '400':
          description: 不支持的格式或无效参数
        '403':
          description: 非当事人或管理员

  /api/v1/wechat/import/formats:
    get:
      tags: [wechat]
      summary: 获取支持的导入格式
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  formats:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        description: { type: string }
                        example:
                          type: string
                          description: 格式示例

  /api/v1/wechat/import/jobs:
    get:
      tags: [wechat]
      summary: 列出导入任务
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, processing, completed, failed, all]
          default: all
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImportJob'

  /api/v1/wechat/import/jobs/{job_id}:
    get:
      tags: [wechat]
      summary: 查询导入任务状态
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '404':
          description: 任务不存在

    delete:
      tags: [wechat]
      summary: 取消导入任务
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: cancelled }
        '404':
          description: 任务不存在
        '409':
          description: 任务已完成，无法取消

  # ════════════════════════════════════════════════════
  # INFO DOMAINS (四大类信息分类)
  # ════════════════════════════════════════════════════

  /api/v1/info-domains:
    get:
      tags: [info-domains]
      summary: 获取四大类信息域定义
      description: |
        返回系统顶层分类标准（四大类）及其下属的二级分类。

        **四大类**：
        - knowledge: 知识库（FAQ、经验总结、术语规则、外部资源）
        - action: 任务与待办（显性任务、隐性承诺、多步骤事项）
        - event: 事件与线索（项目里程碑、问题处理、决策过程）
        - collaboration: 协作网络（沟通关系、任务关系、知识关系）
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/InfoDomain'

  /api/v1/threads:
    get:
      tags: [threads]
      summary: 查询话题线索
      description: |
        支持按四大类（info_domain）或二级分类（category）过滤。
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: domain
          schema:
            type: string
            enum: [knowledge, action, event, collaboration]
          description: 按四大类过滤
        - in: query
          name: category
          schema: { type: string }
          description: 按二级分类过滤
        - in: query
          name: room_id
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [active, resolved, dormant, merged]
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/TopicThread' }
                  total: { type: integer }

  # ════════════════════════════════════════════════════
  # IMPLICIT COMMITMENTS (隐性承诺)
  # ════════════════════════════════════════════════════

  /api/v1/actions/implicit:
    get:
      tags: [actions]
      summary: 获取待确认的隐性承诺列表
      description: |
        隐性承诺是从聊天中自动识别的承诺表达，如"我回头..."、"我会..."。

        需要用户确认后才会转化为正式任务。
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [identified, confirmed, dismissed, all]
          default: identified
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/ImplicitCommitment' }
                  total: { type: integer }

  /api/v1/actions/implicit/{id}/confirm:
    post:
      tags: [actions]
      summary: 确认隐性承诺
      description: 确认后隐性承诺将转化为正式任务
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                assignee_id:
                  type: string
                  description: 指派给谁（可选，默认自己）
                due_date:
                  type: string
                  format: date-time
                  description: 截止时间（可选）
                notes:
                  type: string
                  description: 备注
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: confirmed }
                  action_item_id: { type: string, format: uuid }
        '404':
          description: 隐性承诺不存在
        '409':
          description: 已确认或已忽略

  /api/v1/actions/implicit/{id}/dismiss:
    post:
      tags: [actions]
      summary: 忽略隐性承诺
      description: 标记为误识别，不再提醒
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: 忽略原因
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: dismissed }
        '404':
          description: 隐性承诺不存在
        '409':
          description: 已确认或已忽略

  # ════════════════════════════════════════════════════
  # COLLABORATION NETWORK (协作网络)
  # ════════════════════════════════════════════════════

  /api/v1/collaboration/network:
    get:
      tags: [collaboration]
      summary: 获取协作网络图数据
      description: |
        返回用户之间的协作关系网络，用于可视化展示。

        **关系类型**：
        - communication: 沟通关系（频繁协作、信息桥梁、领域专家）
        - task_based: 任务关系（任务分配者、执行者、评审者）
        - knowledge_based: 知识关系（知识贡献者、提问者、解答者）
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: room_id
          schema: { type: string }
          description: 限定群组范围
        - in: query
          name: relation_type
          schema:
            type: string
            enum: [communication, task_based, knowledge_based, all]
          default: all
        - in: query
          name: time_range
          schema:
            type: string
            enum: [7d, 30d, 90d, all]
          default: 30d
        - in: query
          name: min_weight
          schema: { type: number, default: 1.0 }
          description: 最小关系权重，过滤弱关系
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    description: 用户节点
                    items:
                      type: object
                      properties:
                        user_id: { type: string }
                        display_name: { type: string }
                        total_weight: { type: number }
                        roles:
                          type: array
                          items: { type: string }
                  edges:
                    type: array
                    description: 关系边
                    items:
                      type: object
                      properties:
                        source: { type: string }
                        target: { type: string }
                        relation_type: { type: string }
                        weight: { type: number }
                        interaction_count: { type: integer }

  /api/v1/collaboration/experts:
    get:
      tags: [collaboration]
      summary: 识别领域专家
      description: |
        根据回答问题数量、知识贡献等指标识别领域专家。
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: domain
          schema: { type: string }
          description: 知识领域（如 knowledge）
        - in: query
          name: category
          schema: { type: string }
          description: 二级分类（如 qa_faq）
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  experts:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string }
                        display_name: { type: string }
                        answered_count: { type: integer }
                        avg_impact: { type: number }
                        expertise_areas:
                          type: array
                          items: { type: string }

  /api/v1/collaboration/user/{user_id}/stats:
    get:
      tags: [collaboration]
      summary: 获取用户协作统计
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: string }
                  display_name: { type: string }
                  total_interactions: { type: integer }
                  top_collaborators:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string }
                        display_name: { type: string }
                        interaction_count: { type: integer }
                  roles:
                    type: array
                    items: { type: string }
                  knowledge_contributions: { type: integer }
                  tasks_completed: { type: integer }

security:
  - cookieAuth: []

  # ════════════════════════════════════════════════════
  # FILE SYSTEM (文件系统分级索引与存储)
  # ════════════════════════════════════════════════════

  /api/v1/files/context:
    get:
      tags: [files]
      summary: 获取上下文文件列表
      description: |
        根据查询返回相关的文件列表，遵循分级访问策略：
        - L1 活跃层：默认加载
        - L2 归档层：仅摘要，不加载原文
        - L3 核心层：索引始终加载
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: query
          schema: { type: string }
          description: 查询内容
        - in: query
          name: time_range
          schema:
            type: string
            enum: [recent, all, archived]
          default: recent
          description: 时间范围
        - in: query
          name: layer
          schema:
            type: string
            enum: [L1, L2, L3, all]
          default: all
          description: 指定层级
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  L1_active:
                    type: array
                    items:
                      type: object
                      properties:
                        file_path: { type: string }
                        title: { type: string }
                        last_message_at: { type: string, format: date-time }
                  L2_summaries:
                    type: array
                    items:
                      type: object
                      properties:
                        file_path: { type: string }
                        title: { type: string }
                        summary_preview: { type: string }
                  L3_core:
                    type: array
                    items: { type: string }

  /api/v1/files:
    get:
      tags: [files]
      summary: 列出文件
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: layer
          schema:
            type: string
            enum: [L1, L2, L3]
        - in: query
          name: type
          schema:
            type: string
            enum: [thread, summary, original, graph, index]
        - in: query
          name: status
          schema:
            type: string
            enum: [active, archived, compacted]
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items: { $ref: '#/components/schemas/FileInfo' }
                  total: { type: integer }

  /api/v1/files/{file_path}:
    get:
      tags: [files]
      summary: 获取文件内容
      description: |
        获取指定文件的内容。默认优先返回摘要。

        **访问策略**：
        - L1 文件：直接返回完整内容
        - L2 摘要：返回摘要内容
        - L2 原文：需要 `prefer=original`，解压后返回
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: file_path
          required: true
          schema: { type: string }
          description: 文件路径
        - in: query
          name: prefer
          schema:
            type: string
            enum: [summary, original]
          default: summary
          description: 优先返回摘要还是原文
      responses:
        '200':
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: 文件不存在

  /api/v1/files/original/{thread_id}:
    get:
      tags: [files]
      summary: 获取话题原始文件
      description: 获取话题的完整原始文件（解压后）
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: thread_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
        '404':
          description: 文件不存在

  /api/v1/files/compact:
    post:
      tags: [files]
      summary: 手动触发压缩
      description: |
        管理员可手动触发话题压缩（Compact）。

        **压缩流程**：
        1. 生成话题摘要
        2. 压缩原始文件
        3. 移动到归档层
        4. 更新索引
      security:
        - cookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                thread_ids:
                  type: array
                  items: { type: string, format: uuid }
                compact_type:
                  type: string
                  enum: [L1_to_L2, L2_to_L3]
                  default: L1_to_L2
                force:
                  type: boolean
                  default: false
                  description: 是否强制压缩（忽略时间条件）
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string, format: uuid }
                  status: { type: string }
                  estimated_time: { type: string }
        '403':
          description: 非管理员

  /api/v1/files/compact/jobs/{job_id}:
    get:
      tags: [files]
      summary: 查询压缩任务状态
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: job_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompactJob'

  /api/v1/files/stats:
    get:
      tags: [files]
      summary: 获取文件系统统计
      security:
        - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_files: { type: integer }
                  total_size: { type: integer }
                  by_layer:
                    type: object
                    properties:
                      L1:
                        type: object
                        properties:
                          file_count: { type: integer }
                          total_size: { type: integer }
                          oldest_file: { type: string, format: date-time }
                      L2:
                        type: object
                        properties:
                          file_count: { type: integer }
                          total_size: { type: integer }
                          compressed_size: { type: integer }
                          compression_ratio: { type: number }
                      L3:
                        type: object
                        properties:
                          file_count: { type: integer }
                          total_size: { type: integer }
                  pending_compact:
                    type: object
                    properties:
                      L1_candidates: { type: integer }
                      L2_candidates: { type: integer }
