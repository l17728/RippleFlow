              properties:
                action:
                  type: string
                  enum:
                  - quarantine
                  - restore
                reason:
                  type: string
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqItem'
