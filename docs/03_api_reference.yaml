                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/InfoDomain'
  /api/v1/actions/implicit:
    get:
      tags:
      - actions
      summary: 获取待确认的隐性承诺列表
      description: '隐性承诺是从聊天中自动识别的承诺表达，如"我回头..."、"我会..."。


        需要用户确认后才会转化为正式任务。

        '
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: status
        schema:
          type: string
          enum:
          - identified
          - confirmed
          - dismissed
          - all
        default: identified
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImplicitCommitment'
                  total:
                    type: integer
  /api/v1/actions/implicit/{id}/confirm:
    post:
      tags:
      - actions
      summary: 确认隐性承诺
      description: 确认后隐性承诺将转化为正式任务
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: id
