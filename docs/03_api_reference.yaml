        '404':
          description: 条目不存在
  /api/v1/faq/items/merge:
    post:
      tags:
      - faq
      summary: 合并重复 FAQ 条目
      description: '将多个相似条目合并为一个标准问答对，保留所有 source_threads 和 question_variants。

        **权限**：nullclaw 内部 Token 或 admin。'
      security:
      - botTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - source_ids
              - target
              properties:
                source_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: 待合并的条目 ID 列表（合并后删除）
                target:
                  type: object
                  required:
                  - question
                  - answer
                  properties:
                    question:
                      type: string
                    answer:
                      type: string
                    question_variants:
                      type: array
                      items:
                        type: string
                merge_reason:
                  type: string
      responses:
        '200':
          description: 合并成功，返回新条目
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FaqItem'
