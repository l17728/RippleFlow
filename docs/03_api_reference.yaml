          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    CustomFieldDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entity_type:
          type: string
          enum:
          - thread
          - todo
          - faq_item
          - workflow
        group_id:
          type: string
          nullable: true
        field_key:
          type: string
        field_name:
          type: string
        field_type:
          type: string
          enum:
          - text
          - number
          - date
          - select
          - boolean
        options:
          type: array
          items:
            type: string
        suggested_by:
          type: string
          nullable: true
        adopted_by:
          type: string
          nullable: true
        adopted_at:
          type: string
          format: date-time
          nullable: true
        usage_count:
          type: integer
        created_at:
          type: string
          format: date-time
    CustomFieldValue:
      type: object
      properties:
        entity_type:
          type: string
        entity_id:
          type: string
          format: uuid
        field_id:
          type: string
          format: uuid
        value:
          type: string
          nullable: true
        set_by:
          type: string
        set_at:
          type: string
          format: date-time
    UserDocument:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        content: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        author_id: { type: string }
        group_id: { type: string, nullable: true }
        category: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        visibility: { type: string, enum: [private, followers, team, public] }
        published_at: { type: string, format: date-time, nullable: true }
        view_count: { type: integer }
        butler_suggested_category: { type: string, nullable: true }
        butler_suggested_tags:
          type: array
          items: { type: string }
        source_thread_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SharedLink:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        site_name: { type: string, nullable: true }
        favicon_url: { type: string, nullable: true }
        preview_image: { type: string, nullable: true }
        shared_by: { type: string }
        group_id: { type: string, nullable: true }
        category: { type: string, nullable: true }
        tags:
          type: array
          items: { type: string }
        visibility: { type: string, enum: [private, followers, team, public] }
        butler_suggested_category: { type: string, nullable: true }
        butler_suggested_tags:
          type: array
          items: { type: string }
        butler_summary: { type: string, nullable: true }
        metadata_fetched_at: { type: string, format: date-time, nullable: true }
        fetch_status: { type: string, enum: [pending, success, failed, skipped] }
        view_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ButlerSuggestion:
      type: object
      properties:
        value: { type: string }
        confidence: { type: number, format: float, minimum: 0, maximum: 1 }
        reason: { type: string, maxLength: 30 }
security:
- cookieAuth: []
paths:
  /auth/sso:
    get:
      tags:
      - auth
      summary: 发起 SSO 登录
      description: 重定向至企业 SSO 登录页
      security: []
      parameters:
      - in: query
        name: redirect
        schema:
          type: string
        description: 登录成功后的跳转路径
      responses:
        '302':
          description: 重定向至 SSO
  /auth/callback:
    get:
      tags:
      - auth
      summary: SSO 回调处理
      security: []
      parameters:
      - in: query
        name: token
        required: true
        schema:
          type: string
      responses:
        '302':
          description: 登录成功，设置 Cookie，重定向至 dashboard
        '403':
          description: 用户不在白名单
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
      - auth
      summary: 登出，清除 Cookie
      security:
      - cookieAuth: []
      responses:
        '200':
          description: 登出成功
  /auth/me:
    get:
      tags:
      - auth
      summary: 获取当前登录用户信息
      security:
      - cookieAuth: []
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: 未登录
  /webhook/message:
    post:
      tags:
      - webhook
      summary: 接收聊天工具推送的新消息
      security:
      - webhookSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InboundMessage'
      responses:
        '200':
          description: 消息已接收入队
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                  message_id:
                    type: string
        '400':
          description: 请求参数错误
        '401':
          description: Webhook Secret 无效
  /api/v1/threads:
    get:
      tags:
      - threads
      summary: 查询话题线索
      description: '支持按四大类（info_domain）或二级分类（category）过滤。

        '
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: domain
        schema:
          type: string
          enum:
          - knowledge
          - action
          - event
          - collaboration
        description: 按四大类过滤
      - in: query
        name: category
        schema:
          type: string
        description: 按二级分类过滤
      - in: query
        name: room_id
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - resolved
          - dormant
          - merged
      - in: query
        name: limit
        schema:
          type: integer
          default: 20
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/TopicThread'
                  total:
                    type: integer
  /api/v1/threads/{thread_id}:
    get:
      tags:
      - threads
      summary: 获取话题线索详情
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: thread_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 线索详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadDetail'
        '404':
          description: 线索不存在
  /api/v1/threads/{thread_id}/summary:
    put:
      tags:
      - threads
      summary: 当事人修改话题线索（摘要/结构化数据/状态）
      description: '仅当事人（stakeholder_ids 中）或管理员可调用。

        修改后自动异步同步至原群（冠以用户名）。

        '
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: thread_id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSummaryRequest'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadDetail'
        '403':
          description: 非当事人，无修改权限
        '404':
          description: 线索不存在
  /api/v1/threads/{thread_id}/history:
    get:
      tags:
      - threads
      summary: 获取话题线索摘要历史版本
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: thread_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 历史版本列表（降序）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SummaryHistoryEntry'
  /api/v1/threads/{thread_id}/modifications:
    get:
      tags:
      - threads
      summary: 获取话题线索的当事人修改记录
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: thread_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 修改记录列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModificationRecord'
  /api/v1/search:
    post:
      tags:
      - search
      summary: 全文检索话题线索
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: 检索结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
  /api/v1/qa:
    post:
      tags:
      - search
      summary: LLM 智能问答（基于摘要上下文）
      description: '1. 提取关键词

        2. 全文检索相关线索

        3. 将 Top-10 摘要传给 GLM-4-Plus 生成答案

        '
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QARequest'
      responses:
        '200':
          description: 问答结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QAResponse'
  /api/v1/reference:
    get:
      tags:
      - reference
      summary: 获取参考信息列表
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: q
        schema:
          type: string
        description: 关键词（标签/服务名模糊匹配）
      - in: query
        name: resource_type
        schema:
          type: string
      - in: query
        name: environment
        schema:
          type: string
      - in: query
        name: service_name
        schema:
          type: string
      - in: query
        name: include_deprecated
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: 参考信息列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferenceItem'
  /api/v1/reference/{item_id}:
    get:
      tags:
      - reference
      summary: 获取单条参考信息
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: item_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceItem'
  /api/v1/reference/{item_id}/deprecate:
    post:
      tags:
      - reference
      summary: 标记参考信息为已废弃（当事人或管理员）
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: item_id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeprecateReferenceRequest'
      responses:
        '200':
          description: 已标记废弃
        '403':
          description: 无权限
  /api/v1/action-items:
    get:
      tags:
      - action-items
      summary: 获取任务待办列表
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: assignee
        schema:
          type: string
        description: 按负责人过滤（ldap_user_id）
      - in: query
        name: status
        schema:
          type: string
      - in: query
        name: priority
        schema:
          type: string
          enum:
          - high
          - medium
          - low
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActionItemSummary'
  /api/v1/action-items/{thread_id}/status:
    put:
      tags:
      - action_items
      summary: 更新任务状态
      description: '更新 action_item 类型线索的任务状态。

        分配者、被分配者、管理员均可调用。

        '
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: thread_id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - in_progress
                  - done
                  - cancelled
                note:
                  type: string
                  description: 状态变更说明
      responses:
        '200':
          description: 状态已更新
        '403':
          description: 无权限（非分配者/被分配者/管理员）
        '404':
          description: 线索不存在或非 action_item 类型
  /api/v1/sensitive/pending:
    get:
      tags:
      - sensitive
      summary: 获取当前用户待处理的敏感内容授权列表
      security:
      - cookieAuth: []
      responses:
        '200':
          description: 待授权列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SensitivePendingItem'
  /api/v1/sensitive/{auth_id}:
    get:
      tags:
      - sensitive
      summary: 获取单条敏感授权详情（含完整消息内容）
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: auth_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensitivePendingItem'
        '403':
          description: 非当事人
  /api/v1/sensitive/{auth_id}/decide:
    post:
      tags:
      - sensitive
      summary: 当事人提交授权决策
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: auth_id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SensitiveDecisionRequest'
      responses:
        '200':
          description: 决策已记录
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall_status:
                    type: string
                  pending_count:
                    type: integer
        '403':
          description: 非当事人
        '409':
          description: 已做过决策（拒绝后不可更改）
  /api/v1/sensitive/{auth_id}/nudge:
    post:
      tags:
      - sensitive
      summary: 催促其他当事人尽快决策（发 App 内通知）
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: auth_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 通知已发送
        '403':
          description: 非当事人
        '429':
          description: 24 小时内只能催促一次
  /api/v1/sensitive/batch-authorize:
    post:
      tags:
      - sensitive
      summary: 批量授权敏感内容
      description: 当事人对多条敏感内容统一处理
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - auth_ids
              - decision
              properties:
                auth_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 20
                  description: 敏感授权 ID 列表
                decision:
                  type: string
                  enum:
                  - authorize
                  - reject
                  description: 授权决策
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success_count:
                    type: integer
                  failed_items:
                    type: array
                    items:
                      type: object
                      properties:
                        auth_id:
                          type: string
                          format: uuid
                        reason:
                          type: string
        '400':
          description: 参数错误
        '403':
          description: 部分内容非当事人
  /api/v1/summarize:
    post:
      tags:
      - summarize
      summary: 触发讨论纪要生成（手动）
      description: '对指定群组在指定时间段内的消息生成结构化纪要，

        生成结果作为 discussion_notes 类型的话题线索保存。

        '
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
      responses:
        '200':
          description: 纪要已生成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummarizeResponse'
        '422':
          description: 指定时间段内消息数量不足（< 3 条）
  /api/v1/notifications:
    get:
      tags:
      - notifications
      summary: 获取当前用户的通知列表
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: unread_only
        schema:
          type: boolean
          default: false
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      - in: query
        name: size
        schema:
          type: integer
          default: 50
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  unread_count:
                    type: integer
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
  /api/v1/notifications/{notification_id}/read:
    put:
      tags:
      - notifications
      summary: 标记单条通知为已读
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: notification_id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: 已标记
  /api/v1/notifications/read-all:
    put:
      tags:
      - notifications
      summary: 全部标记为已读
      security:
      - cookieAuth: []
      responses:
        '200':
          description: 已全部标记
  /api/v1/notifications/mark-read:
    post:
      tags:
      - notifications
      summary: 批量标记已读
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - notification_ids
              properties:
                notification_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 100
                  description: 通知 ID 列表
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_count:
                    type: integer
  /admin/whitelist:
    get:
      tags:
      - admin
      summary: 获取白名单列表
      security:
      - cookieAuth: []
      parameters:
      - in: query
        name: q
        schema:
          type: string
      - in: query
        name: role
        schema:
          type: string
      - in: query
        name: include_inactive
        schema:
          type: boolean
          default: false
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WhitelistEntry'
    post:
      tags:
      - admin
      summary: 添加用户到白名单
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWhitelistRequest'
      responses:
        '201':
          description: 用户已添加
        '409':
          description: 用户已在白名单中
  /admin/whitelist/{ldap_user_id}:
    put:
      tags:
      - admin
      summary: 更新白名单用户（角色/激活状态）
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: ldap_user_id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum:
                  - member
                  - admin
                is_active:
                  type: boolean
                notes:
                  type: string
      responses:
        '200':
          description: 已更新
    delete:
      tags:
      - admin
      summary: 从白名单移除用户（软删除，is_active=false）
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: ldap_user_id
        required: true
        schema:
          type: string
      responses:
        '200':
          description: 已移除
        '400':
          description: 不能移除自己
  /admin/categories:
    get:
      tags:
      - admin
      summary: 获取信息类别列表
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryEntry'
    post:
      tags:
      - admin
      summary: 新增自定义信息类别
      security:
      - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: 类别已创建
        '409':
          description: code 已存在
  /admin/categories/{category_id}:
    put:
      tags:
      - admin
      summary: 更新类别定义（内置类别不可修改 code）
      security:
      - cookieAuth: []
      parameters:
      - in: path
        name: category_id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                description:
                  type: string
                trigger_hints:
                  type: array
                  items:
                    type: string
                search_window_days:
                  type: integer
                  nullable: true
                is_active:
                  type: boolean
