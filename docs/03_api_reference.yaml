  /api/v1/info-domains:
    get:
      tags:
      - info-domains
      summary: 获取四大类信息域定义
      description: '返回系统顶层分类标准（四大类）及其下属的二级分类。


        **四大类**：

        - knowledge: 知识库（FAQ、经验总结、术语规则、外部资源）

        - action: 任务与待办（显性任务、隐性承诺、多步骤事项）

        - event: 事件与线索（项目里程碑、问题处理、决策过程）

        - collaboration: 协作网络（沟通关系、任务关系、知识关系）

